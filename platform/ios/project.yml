name: sm64coopdx-ios
options:
  bundleIdPrefix: com.sm64coopdx
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
targets:
  sm64coopdx-ios:
    type: application
    platform: iOS
    sources:
      - path: main.m
      - path: AppDelegate.h
      - path: AppDelegate.m
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sm64coopdx.ios
        INFOPLIST_FILE: Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        ARCHS: arm64
        VALID_ARCHS: arm64
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
